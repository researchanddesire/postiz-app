name: Fly Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".github/workflows/upstream-sync.yml"
  workflow_dispatch:

concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy postiz-rad
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only --ha=false --wait-timeout=900
